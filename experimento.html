<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Oblicuo</title>
    <link rel="stylesheet" href="experimento.css">
</head>
<body>
    <div id="top-bar">
        <div class="ui-box">Puntos: <span id="score-display">0</span></div>
        <div class="ui-box target-box" id="target-box">Objetivo: <span id="target-display">-</span></div>
    </div>

    <div id="roulette-screen" class="overlay">
        <div class="roulette-container">
            <h2>Analizando nuevo estrato...</h2>
            <div id="roulette-color" class="color-box"></div>
            <h3 id="roulette-name">???</h3>
        </div>
    </div>

    <div id="controls-hint">Usa <b>W A S D</b> o las <b>Flechas</b> para moverte.</div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="experimento.js"></script>
</body>
</html>
